<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>HelloWorld 合約測試</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.15.0/ethers.umd.min.js"></script>
</head>
<body style="font-family: Arial; background:#f5f5f5; text-align:center;">

  <h1>HelloWorld 合約測試</h1>

  <div style="background:white; width:500px; margin:auto; padding:20px; border-radius:10px; box-shadow:0 0 10px #ccc;">

    <p>這是一個簡單的網頁，用於測試已部署在 Sepolia 網路上的 HelloWorld 合約。</p>

    <hr>

    <h2>當前訊息</h2>

    <button onclick="connect()" style="width:100%; padding:10px;">連接 MetaMask</button>

    <p>目前訊息：<span id="msg">尚未讀取</span></p>

    <hr>

    <h2>更新訊息</h2>

    <input id="input" placeholder="輸入新的訊息..." style="width:100%; padding:8px;"><br><br>

    <button onclick="update()" style="width:100%; padding:10px;">更新訊息</button>

    <p style="color:grey;">⚠️此操作會發送一筆交易，需要支付 Gas 費用。</p>

    <hr>

    <h2>交易日誌</h2>

    <div id="log" style="background:#eee; padding:10px;">尚未操作</div>

  </div>
<input id="input" placeholder="輸入新訊息">
<button onclick="update()">更新訊息</button>

<script>
const CONTRACT_ADDRESS = "0x21c6b1991a23D121dc9eCA3B959B4D77D1669452";

const ABI = [
  {
    "inputs": [],
    "name": "message",
    "outputs": [{"internalType":"string","name":"","type":"string"}],
    "stateMutability": "view",
    "type": "function"
  },
  {
    "inputs": [{"internalType":"string","name":"_msg","type":"string"}],
    "name": "updateMessage",
    "outputs": [],
    "stateMutability": "nonpayable",
    "type": "function"
  }
];

let provider, signer, contract;

async function connect() {
  await window.ethereum.request({ method: "eth_requestAccounts" });

  provider = new ethers.BrowserProvider(window.ethereum);
  signer = await provider.getSigner();
  contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);

  read();
}

async function read() {
  const message = await contract.message();
  document.getElementById("msg").innerText = message;
}

async function update() {
  const text = document.getElementById("input").value;
  const tx = await contract.updateMessage(text);
  await tx.wait();
  read();
}
</script>

</body>
</html>
