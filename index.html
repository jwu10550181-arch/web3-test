<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>HelloWorld 合約測試</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.15.0/ethers.umd.min.js"></script>
</head>

<body style="font-family: Arial; background:#f5f5f5; text-align:center;">

<h1>HelloWorld 合約測試</h1>

<div style="background:white; width:500px; margin:auto; padding:20px; border-radius:10px; box-shadow:0 0 10px #ccc;">

  <p>這是一個簡單的網頁，用於測試已部署在 Sepolia 網路上的 HelloWorld 合約。</p>

  <hr>

  <h2>當前訊息</h2>

  <button onclick="connectWallet()" style="width:100%; padding:10px;">連接 MetaMask</button>

  <p>目前訊息：<span id="msg">尚未讀取</span></p>

  <hr>

  <h2>更新訊息</h2>

  <input id="inputMsg" placeholder="輸入新的訊息..." style="width:100%; padding:8px; box-sizing:border-box;"><br><br>

  <button onclick="updateMessage()" style="width:100%; padding:10px;">更新訊息</button>

  <p style="color:grey;">⚠️ 此操作會發送一筆交易，需要支付 Gas 費用。</p>

  <hr>

  <h2>交易日誌</h2>

  <div id="log" style="background:#eee; padding:10px;">尚未操作</div>

</div>

<script>
const CONTRACT_ADDRESS = "0x21c6b1991a23d121dc9eca3b959b4d7d71669452";

const CONTRACT_ABI = [
  {
    "inputs": [],
    "name": "message",
    "outputs": [{"internalType":"string","name":"","type":"string"}],
    "stateMutability": "view",
    "type": "function"
  },
  {
    "inputs": [{"internalType":"string","name":"_msg","type":"string"}],
    "name": "updateMessage",
    "outputs": [],
    "stateMutability": "nonpayable",
    "type": "function"
  }
];

let provider;
let signer;
let contract;

function writeLog(text) {
  document.getElementById("log").innerText = text;
}

async function connectWallet() {
  try {
    writeLog("正在連接 MetaMask...");

    if (!window.ethereum) {
      writeLog("錯誤：沒有偵測到 MetaMask，請用安裝 MetaMask 的 Chrome 開啟。");
      return;
    }

    await window.ethereum.request({ method: "eth_requestAccounts" });

    provider = new ethers.BrowserProvider(window.ethereum);
    signer = await provider.getSigner();
    contract = new ethers.Contract(CONTRACT_ADDRESS, CONTRACT_ABI, signer);

    const message = await contract.message();
    document.getElementById("msg").innerText = message || "目前訊息是空白";
    writeLog("MetaMask 連接成功，已讀取合約訊息。");

  } catch (error) {
    writeLog("連接失敗：" + error.message);
  }
}

async function updateMessage() {
  try {
    if (!contract) {
      writeLog("請先連接 MetaMask。");
      return;
    }

    const newMessage = document.getElementById("inputMsg").value;

    writeLog("交易送出中，請在 MetaMask 確認...");
    const tx = await contract.updateMessage(newMessage);

    writeLog("等待區塊確認中...");
    await tx.wait();

    const message = await contract.message();
    document.getElementById("msg").innerText = message || "目前訊息是空白";
    writeLog("更新成功！");

  } catch (error) {
    writeLog("更新失敗：" + error.message);
  }
}
</script>

</body>
</html>
